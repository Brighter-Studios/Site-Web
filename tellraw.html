<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Tellraw Minecraft</title>
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Police Inter de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        
        body {
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 20px 20px;
        }
        
        
        .font-minecraft {
            font-family: 'Roboto Mono', monospace;
            text-shadow: 1px 1px 0 #000000a0;
        }

        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        
        .btn-format.active {
            background-color: #a78bfa; /* violet-400 */
            color: #1e1b4b; /* indigo-950 */
        }
        
        
        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
            border-radius: 8px;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }
        input[type="color"]::-moz-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-950 via-purple-950 to-indigo-950 text-gray-200 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Titre -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 mb-2">
                Générateur Tellraw
            </h1>
            <p class="text-lg text-indigo-200">Créez facilement vos commandes <code>/tellraw</code> complexes pour Minecraft.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Colonne de Gauche : Éditeur -->
            <div class="flex flex-col gap-6">
                <!-- Sélecteur de Cible -->
                <div class="bg-white/5 backdrop-blur-md rounded-xl shadow-lg border border-white/10 p-5">
                    <label for="selector" class="block text-sm font-medium text-purple-300 mb-2">Sélecteur Cible</label>
                    <input type="text" id="selector" value="@a" oninput="updateAll()"
                           class="w-full bg-white/5 border border-purple-400/50 rounded-lg px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400 font-mono"
                           placeholder="Ex: @a, @p, pseudo...">
                </div>

                <!-- Liste des Composants -->
                <div id="component-list" class="flex flex-col gap-4">
                    <!-- Les composants seront insérés ici par JS -->
                </div>

                <!-- Bouton d'ajout -->
                <button onclick="addNewComponent()"
                        class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-[1.02] shadow-lg">
                    + Ajouter un bloc de texte
                </button>
            </div>

            <!-- Colonne de Droite : Aperçu et Commande -->
            <div class="flex flex-col gap-6 lg:sticky lg:top-8 lg:h-screen">
                <!-- Aperçu -->
                <div class="bg-black/60 backdrop-blur-md rounded-xl shadow-lg border border-white/10 p-5">
                    <h2 class="text-xl font-semibold text-purple-300 mb-3">Aperçu</h2>
                    <div id="preview-box" class="font-minecraft text-lg p-4 rounded-lg bg-black/50 border border-white/10 min-h-[100px] whitespace-pre-wrap break-words">
                        <!-- L'aperçu sera généré ici -->
                    </div>
                </div>

                <!-- Commande Générée -->
                <div class="bg-white/5 backdrop-blur-md rounded-xl shadow-lg border border-white/10 p-5">
                    <h2 class="text-xl font-semibold text-purple-300 mb-3">Commande Finale</h2>
                    <div class="relative">
                        <textarea id="output-command" readonly
                                  class="w-full h-40 bg-white/5 border border-purple-400/50 rounded-lg px-3 py-2 text-white font-mono text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none"></textarea>
                        <button id="copy-btn" onclick="copyCommand()"
                                class="absolute top-3 right-3 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-1 px-3 rounded-md transition-all duration-300 transform hover:scale-105">
                            Copier
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        

        
        const mcColors = {
            "black": { hex: "#000000", name: "black" },
            "dark_blue": { hex: "#0000AA", name: "dark_blue" },
            "dark_green": { hex: "#00AA00", name: "dark_green" },
            "dark_aqua": { hex: "#00AAAA", name: "dark_aqua" },
            "dark_red": { hex: "#AA0000", name: "dark_red" },
            "dark_purple": { hex: "#AA00AA", name: "dark_purple" },
            "gold": { hex: "#FFAA00", name: "gold" },
            "gray": { hex: "#AAAAAA", name: "gray" },
            "dark_gray": { hex: "#555555", name: "dark_gray" },
            "blue": { hex: "#5555FF", name: "blue" },
            "green": { hex: "#55FF55", name: "green" },
            "aqua": { hex: "#55FFFF", name: "aqua" },
            "red": { hex: "#FF5555", name: "red" },
            "light_purple": { hex: "#FF55FF", name: "light_purple" },
            "yellow": { hex: "#FFFF55", name: "yellow" },
            "white": { hex: "#FFFFFF", name: "white" },
        };
        const mcColorNames = Object.keys(mcColors);

        
        let components = [
            {
                id: crypto.randomUUID(),
                text: "Votre texte ici",
                color: "white", // Peut être un nom de couleur MC ou un hex #RRGGBB
                bold: false,
                italic: false,
                underline: false,
                strikethrough: false,
                obfuscated: false,
                clickEvent: { action: "none", value: "" },
                hoverEvent: { action: "none", value: "" }
            }
        ];

        

        function addNewComponent() {
            components.push({
                id: crypto.randomUUID(),
                text: "Nouveau texte",
                color: "white",
                bold: false,
                italic: false,
                underline: false,
                strikethrough: false,
                obfuscated: false,
                clickEvent: { action: "none", value: "" },
                hoverEvent: { action: "none", value: "" }
            });
            updateAll();
        }

        function removeComponent(id) {
            components = components.filter(c => c.id !== id);
            
            if (components.length === 0) {
                addNewComponent();
            } else {
                updateAll();
            }
        }

        function getComponent(id) {
            return components.find(c => c.id === id);
        }

        function updateComponentText(id, text) {
            const component = getComponent(id);
            if (component) component.text = text;
            updateAll();
        }

        function toggleFormat(id, format) {
            const component = getComponent(id);
            if (component) {
                component[format] = !component[format];
            }
            updateAll();
        }

        function setComponentColor(id, color) {
            const component = getComponent(id);
            if (component) component.color = color;
            updateAll();
        }
        
        function updateEvent(id, type, field, value) {
            const component = getComponent(id);
            if (component) {
                if (field === 'action') {
                    component[type].action = value;
                    // Réinitialiser la valeur si l'action change
                    component[type].value = "";
                } else if (field === 'value') {
                    component[type].value = value;
                }
            }
            updateAll();
        }

        

        
        function updateAll() {
            renderComponentList();
            renderPreview();
            generateCommand();
        }

        
        function renderComponentList() {
            const container = document.getElementById('component-list');
            // Si le nombre de composants a changé, on re-render tout
            if (container.childElementCount !== components.length) {
                container.innerHTML = components.map(c => getComponentHTML(c)).join('');
            } else {
                // Sinon, on met à jour le texte de chaque textarea sans perdre le focus
                components.forEach((c, i) => {
                    const textarea = container.children[i].querySelector('textarea');
                    if (textarea && textarea.value !== c.text) {
                        textarea.value = c.text;
                    }
                });
            }
        }

        
        function renderPreview() {
            const preview = document.getElementById('preview-box');
            preview.innerHTML = components.map(c => {
                let styles = '';
                if (c.bold) styles += 'font-weight: bold;';
                if (c.italic) styles += 'font-style: italic;';
                
                let textDecoration = '';
                if (c.underline) textDecoration += 'underline ';
                if (c.strikethrough) textDecoration += 'line-through ';
                if (textDecoration) styles += `text-decoration: ${textDecoration.trim()};`;

                let colorHex = c.color.startsWith('#') ? c.color : (mcColors[c.color]?.hex || '#FFFFFF');
                styles += `color: ${colorHex};`;

                let content = c.text.replace(/ /g, '\u00A0'); // Préserver les espaces
                if (c.obfuscated) {
                    styles += 'display: inline-block; background: #ccc; color: #ccc;';
                    content = content.replace(/./g, '█'); // Simuler l'obfuscation
                }

                let hoverTitle = '';
                if (c.hoverEvent.action === 'show_text' && c.hoverEvent.value) {
                    hoverTitle = `title="${c.hoverEvent.value.replace(/"/g, '&quot;')}"`;
                }

                return `<span style="${styles}" ${hoverTitle}>${content}</span>`;
            }).join('');
        }

        
        function generateCommand() {
            const selector = document.getElementById('selector').value || '@a';
            const jsonParts = components.map(c => {
                const part = { text: c.text };

                // Ajouter les booléens de formatage s'ils sont vrais
                if (c.bold) part.bold = true;
                if (c.italic) part.italic = true;
                if (c.underline) part.underline = true;
                if (c.strikethrough) part.strikethrough = true;
                if (c.obfuscated) part.obfuscated = true;

                // Ajouter la couleur
                part.color = c.color; // Fonctionne pour les noms MC et les hex #RRGGBB

                // Ajouter l'événement de clic
                if (c.clickEvent.action !== 'none' && c.clickEvent.value) {
                    part.clickEvent = {
                        action: c.clickEvent.action,
                        value: c.clickEvent.value
                    };
                }

                // Ajouter l'événement de survol (show_text)
                if (c.hoverEvent.action === 'show_text' && c.hoverEvent.value) {
                    part.hoverEvent = {
                        action: "show_text",
                        contents: { text: c.hoverEvent.value } // Minecraft 1.16+ utilise 'contents'
                    };
                }
                
                return part;
            });

            const jsonString = JSON.stringify(jsonParts);
            const command = `/tellraw ${selector} ${jsonString}`;
            document.getElementById('output-command').value = command;
        }

        
        function copyCommand() {
            const output = document.getElementById('output-command');
            output.select();
            
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = "Copié !";
                btn.classList.add('bg-green-500');
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-green-500');
                    btn.classList.add('bg-blue-600', 'hover:bg-blue-500');
                }, 2000);
            } catch (err) {
                console.error('Erreur lors de la copie :', err);
                
            }
        }

        

        
        function getComponentHTML(component) {
            const { id, text, color, bold, italic, underline, strikethrough, obfuscated, clickEvent, hoverEvent } = component;
            
            const commonInputClass = "w-full bg-white/5 border border-purple-400/50 rounded-lg px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400";
            const commonSelectClass = "w-full bg-white/10 border border-purple-400/50 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-purple-400";
            const formatBtnClass = "btn-format flex-1 px-3 py-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all text-sm";
            
            
            const colorGrid = mcColorNames.map(name => `
                <button title="${name}" onclick="setComponentColor('${id}', '${name}')" 
                        class="w-8 h-8 rounded-md border-2 ${color === name ? 'border-blue-400 scale-110' : 'border-white/20'} transition-all" 
                        style="background-color: ${mcColors[name].hex};"></button>
            `).join('');

            return `
            <div class="bg-white/5 backdrop-blur-md rounded-xl shadow-lg border border-white/10 p-5">
                <!-- Header du composant (Texte et Suppression) -->
                <div class="flex items-start gap-4 mb-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-purple-300 mb-2">Texte</label>
                        <textarea oninput="updateComponentText('${id}', this.value)" rows="2"
                                  class="${commonInputClass} min-h-[40px]">${text}</textarea>
                    </div>
                    <button onclick="removeComponent('${id}')" title="Supprimer ce bloc"
                            class="mt-8 text-red-400 hover:text-red-300 bg-red-500/10 hover:bg-red-500/20 rounded-lg p-2 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 6h6v10H7V6z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <!-- Formatage -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-purple-300 mb-2">Formatage</label>
                    <div class="flex gap-2">
                        <button onclick="toggleFormat('${id}', 'bold')" title="Gras"
                                class="${formatBtnClass} ${bold ? 'active' : ''} font-bold">B</button>
                        <button onclick="toggleFormat('${id}', 'italic')" title="Italique"
                                class="${formatBtnClass} ${italic ? 'active' : ''} italic">I</button>
                        <button onclick="toggleFormat('${id}', 'underline')" title="Souligné"
                                class="${formatBtnClass} ${underline ? 'active' : ''} underline">U</button>
                        <button onclick="toggleFormat('${id}', 'strikethrough')" title="Barré"
                                class="${formatBtnClass} ${strikethrough ? 'active' : ''} line-through">S</button>
                        <button onclick="toggleFormat('${id}', 'obfuscated')" title="Obfusqué"
                                class="${formatBtnClass} ${obfuscated ? 'active' : ''} font-mono">?</button>
                    </div>
                </div>

                <!-- Couleur -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-purple-300 mb-2">Couleur</label>
                    <div class="flex flex-wrap gap-2 items-center">
                        ${colorGrid}
                        <div class="relative">
                            <input type="color" value="${color.startsWith('#') ? color : mcColors[color]?.hex || '#FFFFFF'}"
                                   oninput="setComponentColor('${id}', this.value)"
                                   class="border-white/20"
                                   title="Couleur personnalisée (HEX)">
                        </div>
                        <span class="text-sm ml-2 font-mono">${color}</span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Événement au Clic -->
                    <div>
                        <label class="block text-sm font-medium text-purple-300 mb-2">Action au Clic</label>
                        <select onchange="updateEvent('${id}', 'clickEvent', 'action', this.value)" class="${commonSelectClass} mb-2">
                            <option value="none" ${clickEvent.action === 'none' ? 'selected' : ''}>Aucune</option>
                            <option value="run_command" ${clickEvent.action === 'run_command' ? 'selected' : ''}>Exécuter Commande</option>
                            <option value="suggest_command" ${clickEvent.action === 'suggest_command' ? 'selected' : ''}>Suggérer Commande</option>
                            <option value="open_url" ${clickEvent.action === 'open_url' ? 'selected' : ''}>Ouvrir URL</option>
                            <option value="copy_to_clipboard" ${clickEvent.action === 'copy_to_clipboard' ? 'selected' : ''}>Copier (1.15+)</option>
                            <option value="change_page" ${clickEvent.action === 'change_page' ? 'selected' : ''}>Changer Page (Livre)</option>
                        </select>
                        <input type="text" value="${clickEvent.value}"
                               oninput="updateEvent('${id}', 'clickEvent', 'value', this.value)"
                               class="${commonInputClass} ${clickEvent.action === 'none' ? 'hidden' : ''}"
                               placeholder="${clickEvent.action === 'open_url' ? 'https://...' : (clickEvent.action === 'change_page' ? 'Numéro page' : '/commande...')}">
                    </div>

                    <!-- Événement au Survol -->
                    <div>
                        <label class="block text-sm font-medium text-purple-300 mb-2">Action au Survol</label>
                        <select onchange="updateEvent('${id}', 'hoverEvent', 'action', this.value)" class="${commonSelectClass} mb-2">
                            <option value="none" ${hoverEvent.action === 'none' ? 'selected' : ''}>Aucune</option>
                            <option value="show_text" ${hoverEvent.action === 'show_text' ? 'selected' : ''}>Afficher Texte</option>
                        </select>
                        <textarea oninput="updateEvent('${id}', 'hoverEvent', 'value', this.value)" rows="1"
                                  class="${commonInputClass} ${hoverEvent.action !== 'show_text' ? 'hidden' : ''} resize-y min-h-[40px]"
                                  placeholder="Texte à afficher au survol...">${hoverEvent.value}</textarea>
                    </div>
                </div>
            </div>
            `;
        }

        
        document.addEventListener('DOMContentLoaded', () => {
            updateAll();
        });

    </script>
</body>
</html>
